databases:
  - name: booyahzone-db
    databaseName: booyahzone
    user: booyahzone
    plan: free

services:
  - type: web
    name: booyahzone
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: booyahzone-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_SECRET
        sync: false
